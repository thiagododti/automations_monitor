services:
  # db:
  #   container_name: db
  #   image: postgres:16
  #   env_file:
  #     - .env
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - /etc/localtime:/etc/localtime:ro
  #     - /etc/timezone:/etc/timezone:ro
  #   restart: unless-stopped
  #   networks:
  #     - app_network


  botlogger_backend:
    container_name: botlogger_backend
    build: ./backend
    env_file:
      - stack.env
    volumes:
      - media_data:/vol/web/media
      - log_data:/vol/web/logs
    # depends_on:
    #   - db
    restart: unless-stopped
    networks:
      - app_network


  botlogger_nginx:
    container_name: botlogger_nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - media_data:/vol/web/media
      - log_data:/vol/web/logs
      - certificates_data:/etc/nginx/certs
    depends_on:
      - botlogger_backend
    restart: unless-stopped
    networks:
      - app_network

  botlogger_scheduler:
    container_name: botlogger_scheduler
    build: ./backend
    command: python manage.py scheduler
    depends_on:
      - botlogger_backend
    env_file:
      - stack.env
    volumes:
      - media_data:/vol/web/media
      - log_data:/vol/web/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      - app_network
volumes:
  # postgres_data:
  media_data:
  log_data:
  certificates_data:


networks:
  app_network:
    driver: bridge