services:
  db:
    container_name: db
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    

  backend:
    container_name: backend
    build: ./backend
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - media_data:/vol/web/media
      - log_data:/vol/web/logs
    depends_on:
      - db
    expose:
      - "8000"
    # Define servidores DNS personalizados se precisar resolver nomes de domínio específicos
    dns:
      - 8.8.8.8
      - 1.1.1.1
    
    restart: unless-stopped
    command: [
      "gunicorn", "config.wsgi:application",
      "--bind", "0.0.0.0:8000",
      "--workers", "3",
      "--threads", "2",
      "--timeout", "60"
      ]
    
  nginx:
    container_name: nginx
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - media_data:/vol/web/media
      - log_data:/vol/web/logs
      - certificates_data:/etc/nginx/certs
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  log_data:
  certificates_data:
