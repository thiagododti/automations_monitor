server {
    listen 80;
    server_name _;

    # FRONTEND (React build) - Caminho para onde a build do react está localizada
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # BACKEND API - Proxy para o backend Django rodando na porta 3000 do container "backend"
    location /api/ {
        proxy_pass http://botlogger_backend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MEDIA DJANGO - Caminho para os arquivos de mídia do Django
    location /media/ {
        alias /vol/web/media/;
    }

    # LOGS - Caminho para os arquivos de logs do Django
    location /logs/ {
        alias /vol/web/logs/;
    }
}

